<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Dialisis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Dashboard Dialisis</h1>

<!-- FILTER -->
<div class="filter">
  <select id="shift">
    <option value="">Semua Shift</option>
    <option value="1">Shift 1</option>
    <option value="2">Shift 2</option>
  </select>
  <button onclick="loadDashboard()">Terapkan</button>
</div>

<!-- SLIDE 1 -->
<div class="cards">
  <div class="card">Total Pasien<br><span id="totalPasien">0</span></div>
  <div class="card">Total HD<br><span id="totalHD">0</span></div>
  <div class="card">Rawat Inap<br><span id="rawatInap">0</span></div>
  <div class="card">Rawat Jalan<br><span id="rawatJalan">0</span></div>
</div>

<div class="cards">
  <div class="card">AV-Shunt<br><span id="av">0</span></div>
  <div class="card">Double Lumen<br><span id="dl">0</span></div>
  <div class="card">Bed Terpakai<br><span id="bed">0 / 29</span></div>
</div>

<hr>

<!-- SLIDE 2 -->
<h2>Data Pasien</h2>

<table>
  <thead>
    <tr>
      <th>Nama</th>
      <th>MR</th>
      <th>Shift</th>
      <th>Hb</th>
      <th>Status</th>
      <th>Ruang</th>
    </tr>
  </thead>
  <tbody id="table-body"></tbody>
</table>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- Script kita sendiri -->
<script src="script.js"></script>
</body>
</html>
