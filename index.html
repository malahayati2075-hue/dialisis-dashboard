<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Dialisis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Dashboard Dialisis</h1>

<!-- NAV SLIDE -->
<div class="nav-slide">
  <button onclick="showDashboard()">Dashboard</button>
  <button onclick="showPasien()">Data Pasien</button>
</div>

<!-- FILTER -->
<div class="filter">
  <select id="shift">
    <option value="">Semua Shift</option>
    <option value="1">Shift 1</option>
    <option value="2">Shift 2</option>
  </select>
  <button onclick="loadDashboard()">Terapkan</button>
</div>

<!-- ======================
     SLIDE 1 : DASHBOARD
======================= -->
<div id="slide-dashboard">

  <div class="cards">
    <div class="card">
      Total Pasien<br>
      <span id="totalPasien">0</span>
    </div>

    <div class="card">
      Total Tindakan HD<br>
      <span id="totalHD">0</span>
    </div>

    <div class="card">
      Rawat Inap<br>
      <span id="rawatInap">0</span>
    </div>

    <div class="card">
      Rawat Jalan<br>
      <span id="rawatJalan">0</span>
    </div>
  </div>

  <div class="cards">
    <div class="card">
      AV-Shunt<br>
      <span id="av">0</span>
    </div>

    <div class="card">
      Double Lumen<br>
      <span id="dl">0</span>
    </div>

    <div class="card">
      Bed Terpakai<br>
      <span id="bed">0 / 29</span>
    </div>
  </div>

  <h2>Grafik Tindakan (7 Hari Terakhir)</h2>
  <canvas id="chartHD" height="120"></canvas>

</div>

<hr>

<!-- ======================
     SLIDE 2 : DATA PASIEN
======================= -->
<div id="slide-pasien" style="display:none">

  <h2>Data Pasien</h2>

  <table>
    <thead>
      <tr>
        <th>Nama</th>
        <th>MR</th>
        <th>Shift</th>
        <th>Hb</th>
        <th>Status</th>
        <th>Ruang</th>
      </tr>
    </thead>
    <tbody id="table-body"></tbody>
  </table>

</div>

<!-- ======================
     SCRIPT
======================= -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="script.js"></script>

</body>
</html>
